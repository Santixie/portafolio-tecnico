AWSTemplateFormatVersion: '2010-09-09'
Description: >
  TechNova Solutions - Stack de Infraestructura Cloud
  Migración E-Commerce hacia AWS
  ARY1101 - Infraestructura Cloud II
  Incluye: VPC, Subredes, IGW, Route Tables, Security Groups, EC2, RDS MySQL 8.4.x, ECR

# ============================================================
# PARÁMETROS
# ============================================================
Parameters:

  ProjectName:
    Type: String
    Default: technova
    Description: Nombre del proyecto (usado como prefijo en todos los recursos)

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
    Description: Ambiente de despliegue

  # --- Red ---
  VpcCIDR:
    Type: String
    Default: 10.0.0.0/22
    Description: CIDR de la VPC principal

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.0.0/26
    Description: CIDR Subred Publica 1a (EC2)

  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.1.0/26
    Description: CIDR Subred Publica 1b

  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.2.0/26
    Description: CIDR Subred Privada 1a (RDS)

  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.3.0/26
    Description: CIDR Subred Privada 1b (RDS standby)

  # --- EC2 ---
  EC2InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]
    Description: Tipo de instancia EC2

  EC2VolumeSize:
    Type: Number
    Default: 50
    Description: Tamaño del volumen EBS en GB

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Nombre del Key Pair para acceso SSH a EC2

  SSHAllowedIP:
    Type: String
    Default: 0.0.0.0/0
    Description: IP permitida para SSH (recomendado poner tu IP/32)

  # --- RDS ---
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues: [db.t3.micro, db.t3.small, db.t3.medium]
    Description: Tipo de instancia RDS

  DBName:
    Type: String
    Default: tienda_tecnologica
    Description: Nombre de la base de datos

  DBUsername:
    Type: String
    Default: admin
    Description: Usuario master de RDS

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Contraseña del usuario master (min 8 caracteres)

  DBAllocatedStorage:
    Type: Number
    Default: 50
    Description: Tamaño del almacenamiento RDS en GB

# ============================================================
# RECURSOS
# ============================================================
Resources:

  # ----------------------------------------------------------
  # 1. VPC
  # ----------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub vpc-${ProjectName}-vpc
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ----------------------------------------------------------
  # 2. INTERNET GATEWAY
  # ----------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub igw-${ProjectName}

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ----------------------------------------------------------
  # 3. SUBREDES
  # ----------------------------------------------------------

  # Subred Pública 1a (EC2)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub vpc-${ProjectName}-subnet-public1-us-east-1a

  # Subred Pública 1b
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub vpc-${ProjectName}-subnet-public2-us-east-1b

  # Subred Privada 1a (RDS primaria)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub vpc-${ProjectName}-subnet-private1-us-east-1a

  # Subred Privada 1b (RDS standby)
  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub vpc-${ProjectName}-subnet-private2-us-east-1b

  # ----------------------------------------------------------
  # 4. ROUTE TABLES
  # ----------------------------------------------------------

  # Route Table Pública
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub vpc-${ProjectName}-rtb-public

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # Route Table Privada 1a
  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub vpc-${ProjectName}-rtb-private1-us-east-1a

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  # Route Table Privada 1b
  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub vpc-${ProjectName}-rtb-private2-us-east-1b

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  # ----------------------------------------------------------
  # 5. SECURITY GROUPS
  # ----------------------------------------------------------

  # SG para EC2
  SecurityGroupEC2:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub sg_ec2_${ProjectName}
      GroupDescription: Grupo de seguridad para instancia EC2
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHAllowedIP
          Description: SSH administrativo
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP publico
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS publico
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3001
          CidrIp: 0.0.0.0/0
          Description: API Backend Node.js
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Todo el trafico saliente permitido
      Tags:
        - Key: Name
          Value: !Sub sg_ec2_${ProjectName}

  # SG para RDS
  SecurityGroupRDS:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub sg_rds_${ProjectName}
      GroupDescription: Grupo de seguridad para Base de Datos RDS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref SecurityGroupEC2
          Description: MySQL solo desde EC2
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Todo el trafico saliente permitido
      Tags:
        - Key: Name
          Value: !Sub sg_rds_${ProjectName}

  # ----------------------------------------------------------
  # 6. IP ELASTICA
  # ----------------------------------------------------------
  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub eip-${ProjectName}

  ElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      AllocationId: !GetAtt ElasticIP.AllocationId

  # ----------------------------------------------------------
  # 7. INSTANCIA EC2
  # ----------------------------------------------------------
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionAMI, !Ref AWS::Region, Ubuntu2404]
      InstanceType: !Ref EC2InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref SecurityGroupEC2
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref EC2VolumeSize
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Log
          exec > /var/log/user-data.log 2>&1
          set -x

          # Actualizar sistema
          apt update -y && apt upgrade -y

          # Instalar Docker
          apt install -y docker.io

          # Habilitar Docker
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ubuntu

          # Instalar Docker Compose v2
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-linux-x86_64 \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          # Instalar AWS CLI v2
          apt install -y unzip curl
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          ./aws/install

          # Instalar cliente MySQL
          apt install -y mysql-client

          # Instalar herramientas de red
          apt install -y netcat-openbsd

          echo "UserData completado exitosamente"
      Tags:
        - Key: Name
          Value: !Sub ec2-${ProjectName}
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ----------------------------------------------------------
  # 8. RDS SUBNET GROUP
  # ----------------------------------------------------------
  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub rds-subnet-group-${ProjectName}-${Environment}
      DBSubnetGroupDescription: Subnet group para RDS en subredes privadas
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub rds-subnet-group-${ProjectName}

  # ----------------------------------------------------------
  # 9. INSTANCIA RDS
  # ----------------------------------------------------------
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub rds-${ProjectName}
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: '8.4'
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: false
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VPCSecurityGroups:
        - !Ref SecurityGroupRDS
      AvailabilityZone: !Select [0, !GetAZs '']
      BackupRetentionPeriod: 7
      DeletionProtection: false
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Name
          Value: !Sub rds-${ProjectName}
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ----------------------------------------------------------
  # 10. REPOSITORIOS ECR
  # ----------------------------------------------------------
  ECRFrontend:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-frontend
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-frontend
        - Key: Project
          Value: !Ref ProjectName

  ECRBackend:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-backend
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-backend
        - Key: Project
          Value: !Ref ProjectName

# ============================================================
# MAPPINGS — AMIs por región
# ============================================================
Mappings:
  RegionAMI:
    us-east-1:
      Ubuntu2404: ami-0a0e5d9c7acc336f1
    us-east-2:
      Ubuntu2404: ami-0b4624933067d393a
    us-west-2:
      Ubuntu2404: ami-00448a337562d8a08

# ============================================================
# OUTPUTS
# ============================================================
Outputs:

  VPCId:
    Description: ID de la VPC creada
    Value: !Ref VPC
    Export:
      Name: !Sub ${ProjectName}-VPCId

  PublicSubnet1Id:
    Description: ID Subred Publica 1a
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub ${ProjectName}-PublicSubnet1

  PrivateSubnet1Id:
    Description: ID Subred Privada 1a
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub ${ProjectName}-PrivateSubnet1

  EC2InstanceId:
    Description: ID de la instancia EC2
    Value: !Ref EC2Instance

  EC2PublicIP:
    Description: IP Elastica publica de EC2
    Value: !Ref ElasticIP

  EC2PublicDNS:
    Description: DNS publico de la instancia EC2
    Value: !GetAtt EC2Instance.PublicDnsName

  RDSEndpoint:
    Description: Endpoint de conexion a RDS MySQL
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub ${ProjectName}-RDSEndpoint

  RDSPort:
    Description: Puerto de RDS
    Value: !GetAtt RDSInstance.Endpoint.Port

  ECRFrontendURI:
    Description: URI del repositorio ECR Frontend
    Value: !GetAtt ECRFrontend.RepositoryUri

  ECRBackendURI:
    Description: URI del repositorio ECR Backend
    Value: !GetAtt ECRBackend.RepositoryUri

  SecurityGroupEC2Id:
    Description: ID del Security Group de EC2
    Value: !Ref SecurityGroupEC2

  SecurityGroupRDSId:
    Description: ID del Security Group de RDS
    Value: !Ref SecurityGroupRDS

  SSHCommand:
    Description: Comando SSH para conectarse a EC2
    Value: !Sub ssh -i ${KeyPairName}.pem ubuntu@${ElasticIP}
